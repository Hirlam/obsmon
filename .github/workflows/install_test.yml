name: Test obsmon installation

on:
  push:
  pull_request:

jobs:
  test-install:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
          sudo apt-get install -y gpg

      - name: Install CRAN repo for Ubuntu 24.04
        run: |
          sudo mkdir -p /etc/apt/keyrings
          wget -qO- https://cloud.r-project.org/bin/linux/ubuntu/marutter_pubkey.asc | sudo gpg --dearmor -o /etc/apt/keyrings/cran.gpg
          echo "deb [signed-by=/etc/apt/keyrings/cran.gpg] https://cloud.r-project.org/bin/linux/ubuntu noble-cran40/" | sudo tee /etc/apt/sources.list.d/cran.list

      - name: Install latest R from CRAN
        run: |
          sudo apt-get update
          sudo apt-get install -y r-base r-base-dev r-base-core

      - name: Test R version 
        run: |
          R --version

      - name: Install packages needed by obsmon
        run: |
          sudo apt-get install -y curl libcurl4-openssl-dev
          sudo apt-get install -y libfontconfig1-dev libfreetype6-dev libharfbuzz-dev libfribidi-dev
          sudo apt-get install -y libpng-dev libtiff-dev libjpeg-dev
          sudo apt-get install -y libgdal-dev libgeos-dev libproj-dev
          sudo apt-get install -y libnetcdf-dev libudunits2-dev
          sudo apt-get install -y libsqlite3-dev
          sudo apt-get install -y libv8-dev
          sudo apt-get install -y libcairo2 libcairo2-dev
          sudo apt-get install -y libssl-dev

      - name: Install obsmon R packages
        run: |
          ./install

      - name: Run basic CLI check (if applicable)
        run: |
          ./obsmon --help || true
