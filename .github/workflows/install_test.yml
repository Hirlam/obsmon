name: Test obsmon installation

on:
  push:
  pull_request:
  workflow_dispatch:  # optional, allows manual run

jobs:
  test-install:
    # 0. Test installation on Ubuntu with R-4.4.1 and R-4.5.1
    runs-on: ubuntu-latest
    strategy:
      matrix:
        r-version: [4.4.1, 4.5.1]

    steps:
      # 1. Checkout code
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Set up R
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r-version }}

      # 3. Create R cache directory
      - name: Create R cache directory
        run: mkdir -p ~/.cache/Rlibs/${{ matrix.r-version }}

      # 3. Show cache contents
      - name: Show cache contents
        run: ls -lhR ~/.cache/Rlibs/${{ matrix.r-version }}

      # 3. Restore cached R packages (BEFORE install)
      - name: Restore R package cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/Rlibs/${{ matrix.r-version }}
          key: ${{ runner.os }}-r-${{ matrix.r-version }}
          restore-keys: |
            ${{ runner.os }}-r-${{ matrix.r-version }}-
            ${{ runner.os }}-r-

      # 5. Symlink for obsmon installer
      - name: Symlink .installer_local_R-libs/R-libs
        run: |
          pwd
          ls -latr
          mkdir -p .installer_local_R-libs
          ln -sfn ~/.cache/Rlibs/${{ matrix.r-version }} .installer_local_R-libs/R-libs

      # 6. Force R to use the cache path
      - name: Force R library path
        run: echo "R_LIBS_USER=${{ github.workspace }}/.installer_local_R-libs/R-libs" >> ~/.Renviron

      # 7. Install system dependencies
      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gpg curl \
            libcurl4-openssl-dev libfontconfig1-dev libfreetype6-dev \
            libharfbuzz-dev libfribidi-dev libpng-dev libtiff-dev \
            libjpeg-dev libgdal-dev libgeos-dev libproj-dev \
            libnetcdf-dev libudunits2-dev libsqlite3-dev libv8-dev \
            libcairo2 libcairo2-dev libssl-dev

      # 8. Verify R version
      - name: Test R version
        run: R --version

      # 9. Optional: show library paths for debugging
      - name: Debug R library paths
        run: Rscript -e '.libPaths()'

      # 10. Install obsmon R packages
      - name: Install obsmon R packages
        run: ./install

      # 11. Verify the cached directory contains packages
      - name: Verify cached packages
        run: ls -lhR ~/.cache/Rlibs/${{ matrix.r-version }}

      # 12. Cache R packages (will now actually store installed packages)
      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/Rlibs/${{ matrix.r-version }}
          key: ${{ runner.os }}-r-${{ matrix.r-version }}
          restore-keys: |
            ${{ runner.os }}-r-${{ matrix.r-version }}-
            ${{ runner.os }}-r-

      # 13. Optional: test obsmon CLI
      - name: Run obsmon CLI check
        run: ./obsmon --help
