name: Test obsmon installation

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test-install:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        r-version: [4.4.1, 4.5.1]

    steps:
      # 1. Checkout code
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Set up R
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r-version }}

      # 3. Create cache directory
      - name: Create R cache directory
        run: mkdir -p ~/.cache/Rlibs/${{ matrix.r-version }}

      # 4. Restore cache (MUST be before install)
      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/Rlibs/${{ matrix.r-version }}
          key: ${{ runner.os }}-r-${{ matrix.r-version }}
          restore-keys: |
            ${{ runner.os }}-r-${{ matrix.r-version }}-
            ${{ runner.os }}-r-

      # 7. Install system dependencies
      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gpg curl \
            libcurl4-openssl-dev libfontconfig1-dev libfreetype6-dev \
            libharfbuzz-dev libfribidi-dev libpng-dev libtiff-dev \
            libjpeg-dev libgdal-dev libgeos-dev libproj-dev \
            libnetcdf-dev libudunits2-dev libsqlite3-dev libv8-dev \
            libcairo2 libcairo2-dev libssl-dev

      # 8. Verify R version
      - name: Test R version
        run: R --version

      # 9. Debug R library paths
      - name: Debug R library paths
        run: |
          Rscript -e 'print(.libPaths())'
          ls -latr ~/.cache/Rlibs/${{ matrix.r-version }}
          du -sh ~/.cache/Rlibs/${{ matrix.r-version }}
      
      # 10. Install a single package (for testing)
      - name: Install test R package
        run: |
          ls -altr ~/.cache/Rlibs/${{ matrix.r-version }}
          Rscript -e 'install.packages("jsonlite", repos="https://cloud.r-project.org")'

      # 6. List installed packages to verify
      - name: List installed R packages
        run: |
          Rscript -e 'installed.packages()[,c("Package","Version")]'

      # 10. Install obsmon R packages
      - name: Install obsmon R packages
        run: ./install -output-rootdir ~/.cache/Rlibs/${{ matrix.r-version }}

      # 11. Verify the cached directory contains packages
      - name: Verify cached packages
        run: |
          ls -latr ~/.cache/Rlibs/${{ matrix.r-version }}
          du -sh ~/.cache/Rlibs/${{ matrix.r-version }}

      # 13. Optional: test obsmon CLI
      - name: Run obsmon CLI check
        env:
          R_LIBS_USER: /home/runner/.cache/Rlibs/${{ matrix.r-version }}
        run: |
          ./obsmon --help
