name: Test obsmon installation

on:
  push:
  pull_request:

jobs:
  test-install:
    # 0. Test installation on Ubuntu with R-4.4.1 and R-4.5.1
    runs-on: ubuntu-latest
    strategy:
      matrix:
        r-version: [4.4.1, 4.5.1]

    # 0. Set R libs environment variable
    env:
      R_LIBS_USER: ${{ github.workspace }}/Rlibs

    steps:
      # 1. Checkout code
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Set up R
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r-version }}

      # 3. Show cache contents
      - name: Show cache contents
        run: ls -lhR ~/.cache/Rlibs/${{ matrix.r-version }}

      # 3. Restore cached R packages (BEFORE install)
      - name: Restore R package cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/Rlibs/${{ matrix.r-version }}
          key: ${{ runner.os }}-r-${{ matrix.r-version }}-${{ hashFiles('**/DESCRIPTION', '**/install') }}
          restore-keys: |
            ${{ runner.os }}-r-${{ matrix.r-version }}-
            ${{ runner.os }}-r-

      # 4. Prepare library + symlink for obsmon
      - name: Prepare library and symlink
        run: |
          mkdir -p ~/.cache/Rlibs/${{ matrix.r-version }}
          mkdir -p .installer_local_R-libs
          ln -sfn ~/.cache/Rlibs/${{ matrix.r-version }} .installer_local_R-libs/R-libs

      # 5. Force R to use this library
      - name: Set R library path
        run: |
          echo "R_LIBS_USER=${{ github.workspace }}/.installer_local_R-libs/R-libs" >> ~/.Renviron

      # 6. Install system dependencies
      - name: Install packages needed by obsmon
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gpg curl libcurl4-openssl-dev libfontconfig1-dev libfreetype6-dev libharfbuzz-dev libfribidi-dev
          sudo apt-get install -y libpng-dev libtiff-dev libjpeg-dev libgdal-dev libgeos-dev libproj-dev
          sudo apt-get install -y libnetcdf-dev libudunits2-dev libsqlite3-dev libv8-dev libcairo2 libcairo2-dev libssl-dev

      # 7. Verify R installation
      - name: Test R version
        run: R --version

      # 8. Debug library paths (optional but useful)
      - name: Show R library paths
        run: Rscript -e '.libPaths()'

      # 9. Install obsmon R packages
      - name: Install obsmon R packages
        run: ./install

      # 10. Cache R packages after installation
      - name: Cache R packages
        uses: actions/cache@v3
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ matrix.r-version }}-${{ hashFiles('**/DESCRIPTION') }}
          restore-keys: |
            ${{ runner.os }}-r-

      # 11. Verify obsmon CLI
      - name: Run basic CLI check (if applicable)
        run: ./obsmon --help
