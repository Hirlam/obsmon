name: Test obsmon installation

on:
  push:
  pull_request:

jobs:
  test-install:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        r-version: [4.4.1, 4.5.1]

    env:
      R_LIBS_USER: ${{ github.workspace }}/Rlibs  # local R package library for caching

    steps:
      # 1. Checkout code
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Set up R
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r-version }}

      - name: Ensure R library directory exists
        run: mkdir -p "$R_LIBS_USER"

      # 3. Install all system dependencies in one step
      - name: Install packages needed by obsmon
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gpg curl libcurl4-openssl-dev
          sudo apt-get install -y libfontconfig1-dev libfreetype6-dev libharfbuzz-dev libfribidi-dev
          sudo apt-get install -y libpng-dev libtiff-dev libjpeg-dev libgdal-dev libgeos-dev libproj-dev
          sudo apt-get install -y libnetcdf-dev libudunits2-dev libsqlite3-dev libv8-dev libcairo2 libcairo2-dev libssl-dev

      # 6. Verify R installation
      - name: Test R version 
        run: |
          R --version

      # 7. Install obsmon R packages
      - name: Install obsmon R packages
        run: |
          ./install

      # 8. Cache R packages after installation
      - name: Cache R packages
        uses: actions/cache@v3
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ matrix.r-version }}-${{ hashFiles('**/DESCRIPTION') }}
          restore-keys: |
            ${{ runner.os }}-r-

      # 9. Verify obsmon CLI
      - name: Run basic CLI check (if applicable)
        run: |
          ./obsmon --help
